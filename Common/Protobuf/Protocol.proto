syntax = "proto3";
package Protocol;

import "google/protobuf/descriptor.proto"; // descriptor를 사용하기 위해 import

// 1. 커스텀 옵션을 정의.
//    'string' 타입이고, 'handler_name'이라는 이름을 가지며,
//    500001번 필드 번호를 사용합니다. (충돌을 피하기 위해 높은 번호 사용)
extend google.protobuf.MessageOptions {
	string handler_name = 500001;
}

enum MsgId {
	S_ENTER_GAME = 0;
	S_LEAVE_GAME = 1;
	S_SPAWN = 2;
	S_DESPAWN = 3;
	C_MOVE = 4;
	S_MOVE = 5;
	C_CHAT = 6;
	S_CHAT = 7;
	S_PLAYER_UPDATE = 8;	// 플레이어 상태 변경 알림
	S_PLAYER_STAT = 9;		// 플레이어 스탯 정보
	C_PLAYER_INFO = 10;		// 플레이어 정보 요청
	C_USE_SKILL = 11;		// 플레이어 스킬 사용
	S_DAMAGE = 12;			// 데미지 처리
	S_HEAL = 13;			// 회복 처리
	S_LEVEL_UP = 14;		// 레벨업 알림
}

// 서버 -> 클라이언트
// 게임 입장
message S_EnterGame {
	option (handler_name) = "SystemPacketHandler";
	PlayerInfo player = 1;
}

// 서버 -> 클라이언트
// 플레이어가 게임을 떠났을 때,
message S_LeaveGame {
	option (handler_name) = "SystemPacketHandler";
	int64 playerId = 1;
}

// 서버 -> 클라이언트
// 새로운 플레이어, 몬스터 등이 시야에 나왔을 때.
message S_Spawn {
	option (handler_name) = "GamePlayPacketHandler";
	repeated PlayerInfo players = 1;
}

// 서버 -> 클라이언트
// 플레이어 / 몬스터 등이 시야에서 사라졌을 때.
message S_Despawn {
	option (handler_name) = "GamePlayPacketHandler";
	repeated int64 objectIds = 1;
}

// 클라이언트 -> 서버
// 이동 했을 때 주기적으로 전송.
message C_Move {
	option (handler_name) = "MovementPacketHandler";
	PosInfo posInfo = 1;
}

// 서버 -> 클라이언트
// 다른 플레이어 / 몬스터가 이동했을 때 브로드 캐스팅.
message S_Move {
	option (handler_name) = "MovementPacketHandler";
	int64 playerId = 1;
	PosInfo posInfo = 2;
}

// 클라이언트 -> 서버
// 클라이언트가 채팅 전송.
message C_Chat {
	option (handler_name) = "ChatPacketHandler";
	string message = 1;
}

message S_Chat {
	option (handler_name) = "ChatPacketHandler";
	int64 playerId = 1;
	string message = 2;
}

message S_PlayerUpdate {
	option (handler_name) = "GamePlayPacketHandler";
	PlayerInfo player = 1;
}

message S_PlayerStat {
	option (handler_name) = "GamePlayPacketHandler";
	PlayerInfo player = 1;
}

message C_PlayerInfo {
	option (handler_name) = "GamePlayPacketHandler";
	int64 targetPlayerId = 1;	// 조회할 플레이어 ID (0이면 자신)
}

message C_UseSkill {
	option (handler_name) = "GamePlayPacketHandler";
	int32 skillId = 1;
	int64 targetId = 2;	// 타겟 Id (0이면 자기 자신)
}

message S_Damage {
	option (handler_name) = "GamePlayPacketHandler";
	int64 attackerId = 1;
	int64 targetId = 2;
	int32 damage = 3;
	int32 currentHP = 4;	// 데미지 처리 후 현재 HP
}

message S_Heal {
	option (handler_name) = "GamePlayPacketHandler";
	int64 healerId = 1;
	int64 targetId = 2;
	int32 healAmount = 3;
	int32 currentHP = 4;	// 힐 처리 후 현재 HP
}

message S_LevelUp {
	option (handler_name) = "GamePlayPacketHandler";
	int64 playerId = 1;
	int32 newLevel = 2;
	int32 newMaxHP = 3;
	int32 newMaxMP = 4;
}

// --------- 공용 데이터 구조 --------- 

enum PlayerState {
	IDLE = 0;
	WALKING = 1;
	RUNNING = 2;
	JUMPING = 3;
	FLYING = 4;
	FALLING = 5;
	COMBAT = 6;
	DEAD = 7;
	DISCONNECTED = 8;
}

message PlayerInfo {
	int64 playerId = 1;
	string name = 2;
	PosInfo posInfo = 3;
	int32 level = 4;
	int32 currentHP = 5;
	int32 maxHP = 6;
	int32 currentMP = 7;
	int32 maxMP = 8;
	int64 experience = 9;
	PlayerState state = 10;
}

message PosInfo {
	float posX = 1;			// x축
	float posY = 2;			// y축
	float posZ = 3;			// z축
	float rotationX = 4;	// x축 회전 (pitch) - 위/아래
	float rotationY = 5;	// y축 회전 (yaw) - 좌/우
	float rotationZ = 6;	// z축 회전 (roll) - 기울기
	int64 timestamp = 7;	// 위치 업데이트 시간 (성능용)
}

message Item {
	int32 id = 1;
	string name = 2;
}

message Monster {
	int32 id = 1;
	string name = 2;
}

message Skill {
	int32 id = 1;
	string name = 2;
}