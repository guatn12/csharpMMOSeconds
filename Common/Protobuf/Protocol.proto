syntax = "proto3";
package Protocol;

import "google/protobuf/descriptor.proto"; // descriptor를 사용하기 위해 import

enum PacketCategory {
	NONE_CATEGORY = 0;			// 카테고리 없음 - 미사용 오류 분별용
	SYSTEM = 1;					// 시스템 레벨 (입장/퇴장)
	ROOM = 2;					// Room 레벨
	COMBAT = 3;					// 전투 관련
	INVENTORY = 4;				// 인벤토리 관련
}

extend google.protobuf.MessageOptions {
	PacketCategory category = 500002;
}

enum MsgId {
	C_ENTER_GAME = 0;		// 게임 입장 요청 (클라이언트 → 서버)
	S_ENTER_GAME = 1;
	S_LEAVE_GAME = 2;
	S_SPAWN = 3;
	S_DESPAWN = 4;
	C_MOVE = 5;
	S_MOVE = 6;
	C_CHAT = 7;
	S_CHAT = 8;
	S_PLAYER_UPDATE = 9;	// 플레이어 상태 변경 알림
	S_PLAYER_STAT = 10;		// 플레이어 스탯 정보
	C_PLAYER_INFO = 11;		// 플레이어 정보 요청
	C_USE_SKILL = 12;		// 플레이어 스킬 사용
	S_DAMAGE = 13;			// 데미지 처리
	S_HEAL = 14;			// 회복 처리
	S_LEVEL_UP = 15;		// 레벨업 알림

	// 인벤토리
	C_INVENTORY_REQUEST = 16;	// 인벤토리 조회 요청
	S_INVENTORY_DATA = 17;		// 인벤토리 데이터 전송
	C_USE_ITEM = 18;			// 아이템 사용
	S_USE_ITEM = 19;			// 아이템 사용 결과
	C_EQUIP_ITEM = 20;			// 아이템(장비) 장착
	S_ITEM_EQUIPPED = 21;		// 아이템(장비) 장착 결과
	C_UNEQUIP_ITEM = 22;		// 아이템(장비) 해제
	S_ITEM_UNEQUIPPED = 23;		// 아이템(장비) 해제 결과
	S_ITEM_ADDED = 24;			// 아이템 획득 알림
	S_INVENTORY_UPDATE = 25;	// 인벤토리 변경 알림

	// 몬스터
	S_MONSTER_DIE = 26;			// 몬스터 사망 알림
	S_MONSTER_UPDATE = 27;		// 몬스터 상태 업데이트
}

message C_EnterGame {
	option (category) = SYSTEM;
}

// 서버 -> 클라이언트
// 게임 입장
message S_EnterGame {
	option (category) = SYSTEM;
	ObjectInfo player = 1;
	int32 mapId = 2;			// 입장한 맵 ID
}

// 서버 -> 클라이언트
// 플레이어가 게임을 떠났을 때,
message S_LeaveGame {
	option (category) = SYSTEM;
	int64 objectId = 1;
}

// 서버 -> 클라이언트
// 새로운 플레이어, 몬스터 등이 시야에 나왔을 때.
message S_Spawn {
	option (category) = ROOM;
	repeated ObjectInfo objects = 1;
}

// 서버 -> 클라이언트
// 플레이어 / 몬스터 등이 시야에서 사라졌을 때.
message S_Despawn {
	option (category) = ROOM;
	repeated ObjectInfo objects = 1;
}

// 클라이언트 -> 서버
// 이동 했을 때 주기적으로 전송.
message C_Move {
	option (category) = ROOM;
	PosInfo posInfo = 1;
}

// 서버 -> 클라이언트
// 다른 플레이어 / 몬스터가 이동했을 때 브로드 캐스팅.
message S_Move {
	option (category) = ROOM;
	repeated ObjectInfo objects = 1;
}

// 클라이언트 -> 서버
// 클라이언트가 채팅 전송.
message C_Chat {
	option (category) = ROOM;
	string message = 1;
}

message S_Chat {
	option (category) = ROOM;
	int64 playerId = 1;
	string message = 2;
}

message S_PlayerUpdate {
	option (category) = ROOM;
	ObjectInfo player = 1;
}

message S_PlayerStat {
	option (category) = ROOM;
	ObjectInfo player = 1;
}

message C_PlayerInfo {
	option (category) = ROOM;
	int64 targetPlayerId = 1;	// 조회할 플레이어 ID (0이면 자신)
}

message C_UseSkill {
	option (category) = COMBAT;
	int32 skillId = 1;
	int64 targetId = 2;	// 타겟 Id (0이면 자기 자신)
}

message S_Damage {
	option (category) = COMBAT;
	ObjectDamageInfo attacker = 1;
	repeated ObjectDamageInfo targets = 2;
}

message S_Heal {
	option (category) = COMBAT;
	ObjectDamageInfo healer = 1;
	repeated ObjectDamageInfo targets = 2;
}

message S_LevelUp {
	option (category) = ROOM;
	int64 playerId = 1;
	int32 newLevel = 2;
	int32 newMaxHP = 3;
	int32 newMaxMP = 4;
}

message C_InventoryRequest {
	option (category) = INVENTORY;
}

message S_InventoryData {
	option (category) = INVENTORY;
	repeated InventoryItemInfo items = 1;
	int64 gold = 2;
	int32 maxSlots = 3;
}

message C_UseItem {
	option (category) = INVENTORY;
	int32 slot = 1;				// 인벤 슬롯
	int32 quantity = 2;			// 사용할 수량 (기본 1)
}

message S_UseItem {
	option (category) = INVENTORY;
	bool success = 1;
	int32 slot = 2;
	int32 remainingQuantity = 3;
	string message = 4;
}

message C_EquipItem {
	option (category) = INVENTORY;
	int32 inventorySlot = 1;		// 인벤토리 슬롯
	int32 equipSlot = 2;			// 장착 슬롯 (0 = 무기, 1 = 갑옷)
}

message S_ItemEquipped {
	option (category) = INVENTORY;
	bool success = 1;
	int32 inventorySlot = 2;
	int32 equipSlot = 3;
	EquipmentInfo updatedEquipment = 4;
	StatInfo updatedStats = 5;
}

message C_UnequipItem {
	option (category) = INVENTORY;
	int32 equipSlot = 1;		// 해제할 장착 슬롯
}

message S_ItemUnequipped {
	option (category) = INVENTORY;
	bool success = 1;
	int32 equipSlot = 2;
	int32 returnedToSlot = 3;			// 인벤토리로 돌아간 슬롯?
	EquipmentInfo updatedEquipment = 4;
	StatInfo updatedStats = 5;
}

message S_ItemAdded {
	option (category) = INVENTORY;
	InventoryItemInfo item = 1;
	string source = 2;			// 획득 경로
}

message S_InventoryUpdate {
	option (category) = INVENTORY;
	repeated InventoryItemInfo changedItems = 1;
	int64 newGold = 2;
}

// 몬스터
message S_MonsterDie {
	option (category) = COMBAT;
	int64 monsterId = 1;
	int64 killPlayerId = 2;
	int64 expGained = 3;
	int64 goldGained = 4;
	repeated InventoryItemInfo droppedItems = 5;
}

// 몬스터 상태 변경(state, hp 등)
message S_MonsterUpdate {
	option (category) = ROOM;
	repeated ObjectInfo monsters = 1;
}


// --------- 공용 데이터 구조 --------- 

enum ObjectType {
	OBJECT_NONE = 0;
	OBJECT_PLAYER = 1;
	OBJECT_MONSTER = 2;
	OBJECT_NPC = 3;
}

message ObjectInfo {
	int64 objectId = 1;
	ObjectType type = 2;
	string name = 3;
	PosInfo posInfo = 4;
	StatInfo statInfo = 5;
	State state = 6;
	// 2개의 정보 중 1개만 사용된다. - playerInfo에 데이터가 있으면 monsterInfo는 null처리된다.
	oneof info {
		PlayerDetailInfo playerDetailInfo = 7;
		MonsterDetailInfo monsterDetailInfo = 8;
	}
}

// 데미지 처리 임시. 다시 수정 필요.
message ObjectDamageInfo {
	ObjectType type = 1;
	int64 objectId = 2;
	int32 damage = 3;
	int32 currentHP = 4;
	bool isCritical = 5;
}

message StatInfo {
	int32 attack = 1;			// 기본 공격력
	int32 defense = 2;			// 기본 방어력
	int32 maxHP = 3;			// 최대 HP
	int32 maxMP = 4;			// 최대 MP
	int32 currentHP = 5;		// 현재 HP
	int32 currentMP = 6;		// 현재 MP
	int64 experience = 7;		// 경험치
	int32 level = 8;			// 레벨
	float speed = 9;			// 이동 속도
}

message PosInfo {
	float posX = 1;			// x축
	float posY = 2;			// y축
	float posZ = 3;			// z축
	float rotationX = 4;	// x축 회전 (pitch) - 위/아래
	float rotationY = 5;	// y축 회전 (yaw) - 좌/우
	float rotationZ = 6;	// z축 회전 (roll) - 기울기
	int64 timestamp = 7;	// 위치 업데이트 시간 (성능용)
}

enum State {
	IDLE = 0;					// 대기
	PATROL = 1;					// 탐색
	RETURN = 2;					// 귀환
	WALKING = 3;				// 걷기
	RUNNING = 4;				// 달리기
	JUMPING = 5;				// 점프
	CHASE = 6;					// 추적
	FLYING = 7;					// 날기
	FALLING = 8;				// 추락
	IN_COMBAT = 9;				// 전투
	DEAD = 10;					// 사망
}

message PlayerDetailInfo {
	bool isGameMaster = 1;
}

message InventoryItemInfo{
	int32 itemId = 1;
	int32 quantity = 2;
	int32 slot = 3;
	int32 enhancementLevel = 4;
	map<string, double> options = 5;
	string customName = 6;
	int64 acquiredAt = 7;				// Unix timestamp
}

message EquipmentInfo {
	int32 weaponItemId = 1;		// 무기 아이템 ID (0이면 없음)
	int32 armorItemId = 2;		// 갑옷 아이템 ID (0이면 없음)
	int32 helmetItemId = 3;		// 헬멧
	int32 glovesItemId = 4;		// 장갑
}

message MonsterDetailInfo {
	int32 templatedId = 1;
}
